name: Breathe CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Unit tests
        run: pytest -q

      - name: Contract test — fixed agent must pass
        run: |
          mkdir -p reports
          breathe run examples/support-agent/breathe-fixed.yaml \
            --report reports/breathe-report.md \
            --json-report reports/breathe-report.json

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: breathe-reports
          path: reports/
